name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type-check · Build · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          # Prisma needs a valid connection string format (no live DB required for build)
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/devprep?schema=devprep"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/devprep"
          # Auth
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: "https://example.com"
          GOOGLE_CLIENT_ID: "ci-placeholder"
          GOOGLE_CLIENT_SECRET: "ci-placeholder"
          # AI — Ollama needs no API key, safe for CI
          AI_PROVIDER: "ollama"
          AI_ROUTING: "single"
          OLLAMA_BASE_URL: "http://localhost:11434"
          OLLAMA_MODEL: "llama3.1:8b"
          # App
          NEXT_PUBLIC_APP_URL: "https://example.com"
          NEXT_PUBLIC_DEFAULT_LOCALE: "en"

  deploy:
    name: Deploy to Vercel
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (production)
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
